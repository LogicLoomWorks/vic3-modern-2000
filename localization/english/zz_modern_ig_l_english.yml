 ig_security_services:0 "Security Services"
 ig_security_services_desc:0 "The intelligence officers, counterterrorism analysts, surveillance bureaucrats, and law-enforcement heavyweights who see every open society as a target and every reform as a potential vulnerability. When in government, they expand their mandates, classify their budgets, and argue — always credibly — that the threat environment justifies the next increment of state power."

 # ── IG Traits ──────────────────────────────────────────────────────────────
 ig_trait_tech_lobby:0 "Tech Lobby"
 ig_trait_tech_lobby_desc:0 "Close ties between this group and the technology sector translate into faster permitting, lighter regulation, and preferential access to state contracts. Construction pipelines accelerate and research institutions expand when this group holds influence."

 ig_trait_military_industrial:0 "Military-Industrial Complex"
 ig_trait_military_industrial_desc:0 "Deep integration with defense procurement means this group can direct state authority toward strategic industries. Bureaucratic pathways for military hardware and munitions are well-lubricated, and international brinkmanship is normalized rather than stigmatized."

 ig_trait_religious_authority:0 "Religious Authority"
 ig_trait_religious_authority_desc:0 "The moral weight of religious institutions bolsters the government's legitimacy and amplifies its capacity to demand compliance. Authority is higher and the population more willing to accept the state's rulings on contested social questions."

 ig_trait_social_solidarity:0 "Social Solidarity"
 ig_trait_social_solidarity_desc:0 "A culture of collective bargaining and mutual aid strengthens public institutions and extends the social contract. Welfare systems, unions, and community organizations become denser and more resilient, and the government derives legitimacy from its role as guarantor of shared welfare."

 ig_trait_financial_elite:0 "Financial Elite"
 ig_trait_financial_elite_desc:0 "Access to global capital networks increases tax efficiency through better investment allocation and gives the country disproportionate leverage in diplomatic negotiations. Money talks, and this group knows all the languages."

 ig_trait_green_lobby:0 "Green Lobby"
 ig_trait_green_lobby_desc:0 "Pressure from environmental advocates channels state investment toward clean infrastructure and responsible foreign policy. International standing improves, infamy decays faster as aggressive postures become politically costly, and construction pivots toward sustainable sectors."

 ig_trait_rural_traditionalism:0 "Rural Traditionalism"
 ig_trait_rural_traditionalism_desc:0 "Deep roots in the countryside give this movement a quiet but durable claim on national identity. The government draws legitimacy from its association with land, tradition, and continuity, and its authority over the rural hinterland is uncontested."

 ig_trait_academic_reformers:0 "Academic Reformers"
 ig_trait_academic_reformers_desc:0 "Universities, think tanks, and research centers flourish under this group's influence, expanding the state's institutional capacity and generating soft-power dividends through intellectual exports and international collaboration."

 ig_trait_security_state:0 "Security State"
 ig_trait_security_state_desc:0 "Surveillance infrastructure, classification authority, and expanded law-enforcement powers concentrate authority at the center and make repression routine. Infamy fades quickly because no one complains loudly twice. Legitimacy erodes in proportion, as civil society learns to self-censor."
