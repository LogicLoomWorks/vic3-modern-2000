l_english:
 # ── Interest Groups (vanilla key overrides) ────────────────────────────────
 ig_industrialists:0 "Technology Industry"
 ig_industrialists_desc:0 "The engineers, software developers, data scientists, and digital entrepreneurs who form the commanding heights of the modern economy. They favor open markets, light-touch regulation, and state investment in infrastructure — and they believe technological progress is the solution to every problem that politics has failed to solve."

 ig_armed_forces:0 "Military Establishment"
 ig_armed_forces_desc:0 "Professional officers, defense industrialists, and strategic planners who see national security as the first obligation of any government. They support robust procurement budgets, nuclear deterrence, and a foreign policy that is not afraid to project force. In their view, weakness invites aggression, and every concession to cost-cutting is paid for in blood."

 ig_devout:0 "Religious Institutions"
 ig_devout_desc:0 "The clergy, faith communities, and conservative civic organizations that anchor the moral life of the nation. They distrust rapid social change, defend traditional family structures, and believe that a society which loses its spiritual center has nothing left but appetites. Their political influence is greatest where urbanization has not yet dissolved the bonds of community."

 ig_trade_unions:0 "Organized Labor"
 ig_trade_unions_desc:0 "The trade unions, workers' federations, and labor activists who represent the interests of those who work with their hands and their machines. They fought for the eight-hour day and the right to strike; they now fight for universal healthcare, living wages, and trade policies that protect workers rather than shareholders. Their strength lies in numbers and solidarity."

 ig_petty_bourgeoisie:0 "Financial Sector"
 ig_petty_bourgeoisie_desc:0 "The bankers, asset managers, derivatives traders, and financial analysts who intermediate the allocation of capital across the global economy. They understand risk, price it, and move it — and they want governments that keep inflation low, taxes moderate, and borders open to money if not to people. In prosperity they are celebrated; in crisis they are blamed."

 ig_landowners:0 "Green Movement"
 ig_landowners_desc:0 "The ecologists, climate scientists, environmental NGOs, and urban reformists who have concluded that industrial civilization is racing toward catastrophe. They demand a managed transition away from fossil fuels, stronger social safety nets to cushion the disruption, and a politics of sufficiency rather than endless growth. They are well-educated, urban, and increasingly impatient."

 ig_rural_folk:0 "Rural Populists"
 ig_rural_folk_desc:0 "The farmers, smallholders, and rural laborers who feel overlooked by a political class that speaks the language of cities, universities, and global markets. They want protected home markets, controlled borders, and a state that remembers them when writing policy. Their power is greatest when they translate economic grievance into cultural and national identity."

 ig_intelligentsia:0 "Intelligentsia"
 ig_intelligentsia_desc:0 "The academics, researchers, writers, and public intellectuals who shape the ideas that eventually become policy. They are broadly reformist — committed to evidence-based governance, civil liberties, universal healthcare, and a free press. They rarely hold power directly but are indispensable to any coalition that wants to govern well rather than merely govern."

